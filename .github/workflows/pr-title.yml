name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate conventional PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|test|refactor|chore|build|ci|perf)(\([a-z0-9-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits, for example: feat(board): add typed generator"
            echo "Actual: $PR_TITLE"
            exit 1
          fi
